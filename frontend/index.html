<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake | Advanced Frontend</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-container"></div>

    <div class="game-wrapper">
        <header class="game-header">
            <h1 class="logo">SNAKE <span class="neon-text">NEON</span></h1>
            <div class="score-board">
                <div class="score-card">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-card high-score">
                    <span class="label">BEST</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </header>

        <main class="canvas-container">
            <canvas id="game-canvas" width="600" height="400"></canvas>

            <div id="start-screen" class="overlay">
                <h2>READY?</h2>
                <button id="start-btn" class="glow-btn">PLAY NOW</button>
            </div>

            <div id="game-over-screen" class="overlay hidden">
                <h2>SYSTEM FAILURE</h2>
                <p>FINAL SCORE: <span id="final-score">0</span></p>
                <button id="restart-btn" class="glow-btn">REBOOT SYSTEM</button>
            </div>
        </main>

        <div class="controls-hint">
            <p>Use ARROW KEYS or WASD to navigate.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
